services:
  product-service:
    build:
      context: ./product-service 
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
    command: node dist/src/main.js
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - RABBITMQ_URL=${RABBITMQ_URL}
      # - CLICKHOUSE_HOST=monitoring-clickhouse
      - PORT=${PORT}
    ports:
      - '3002:3000'
    # volumes:
      # - ./product-service:/app  # для hot-reload
      # - /app/node_modules
      # - /app/dist 
    # logging: # Включаем "сбор логов" для Loki
      # driver: "json-file"
      # options:
        # tag: "gateway-core"
    depends_on:
      thebox-db: { condition: service_healthy }
      redis: { condition: service_healthy }
      # loki: { condition: service_started } # Ждем лог-сервер
    restart: unless-stopped
  
